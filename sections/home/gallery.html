<section class="section framed-section gallery-section" id="gallery">
  <div class="section-heading">
    <h2>水墨绘卷</h2>
    <p>一剑霜寒十四州，尽览江湖风物</p>
  </div>
  <div class="gallery-carousel" data-gallery aria-label="游戏图集">
    <button class="gallery-nav gallery-nav--prev" type="button" aria-label="上一张" data-gallery-prev>
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="M9 5l7 7-7 7" />
      </svg>
    </button>
    <div class="gallery-track">
      <article class="gallery-slide is-active" data-gallery-slide style="--gallery-image: url('../assets/images/mountain_gate.webp');">
        <span>山门</span>
        <h3>云海栈道</h3>
      </article>
      <article class="gallery-slide" data-gallery-slide style="--gallery-image: url('../assets/images/martial_world.webp');">
        <span>江湖</span>
        <h3>古镇烟雨</h3>
      </article>
      <article class="gallery-slide" data-gallery-slide style="--gallery-image: url('../assets/images/mountains_rivers.webp');">
        <span>山水</span>
        <h3>万壑听松</h3>
      </article>
      <article class="gallery-slide" data-gallery-slide style="--gallery-image: url('../assets/images/secret_realm.webp');">
        <span>秘境</span>
        <h3>幽谷问剑</h3>
      </article>
      <article class="gallery-slide" data-gallery-slide style="--gallery-image: url('../assets/images/city.webp');">
        <span>城池</span>
        <h3>夜火连营</h3>
      </article>
    </div>
    <button class="gallery-nav gallery-nav--next" type="button" aria-label="下一张" data-gallery-next>
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="M9 5l7 7-7 7" />
      </svg>
    </button>
    <div class="gallery-dots" data-gallery-dots aria-label="选择图集页"></div>
  </div>
</section>
