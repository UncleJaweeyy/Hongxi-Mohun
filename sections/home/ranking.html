<section class="section framed-section ranking-section" id="rank">
  <div class="section-heading">
    <h2>风云龙虎榜</h2>
  </div>
  <div class="rank-shell">
    <div class="segmented-control rank-tabs" role="tablist" aria-label="龙虎榜分类">
      <button type="button" class="is-active" data-rank-tab="worldBoss">世界头目</button>
      <button type="button" data-rank-tab="dungeon">全色达人</button>
      <button type="button" data-rank-tab="slaughter">杀戮战场</button>
      <button type="button" data-rank-tab="siege">攻城争霸</button>
    </div>
    <div class="rank-list" aria-live="polite">
      <div class="rank-header" role="row">
        <span>排名</span>
        <span>豪侠</span>
        <span>帮派</span>
        <span>等级</span>
      </div>
      <div id="rank-body" class="rank-body"></div>
      <div class="empty-panel" data-rank-empty>榜单暂未开放</div>
    </div>
  </div>
</section>
