<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Basic document settings: character encoding, responsive viewport, and SEO metadata. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="《鸿禧墨魂+30》是一款国风武侠 MMORPG。江湖无界，一世墨魂，开启属于你的武侠征途。">
    <meta name="keywords" content="鸿禧墨魂+30, 鸿禧墨魂, 武侠游戏, MMORPG, 国风游戏, 江湖">
    <meta name="author" content="鸿禧墨魂运营团队">

    <meta property="og:image" content="assets/images/background_image.webp">
    <meta property="og:type" content="website">
    <title>鸿禧墨魂+30</title>

    <!-- Browser/app icons shown in tabs, bookmarks, and mobile home-screen shortcuts. -->
    <link rel="icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-chrome-192x192.png">

    <!-- Performance preloads for above-the-fold images and the custom calligraphy font. -->
    <link rel="preload" href="assets/images/title_logo/big_cloud.webp" as="image" type="image/webp" fetchpriority="high">
    <link rel="preload" href="assets/images/title_logo/small_cloud.webp" as="image" type="image/webp" fetchpriority="high">
    <link rel="preload" href="assets/images/title_logo/title_logo.webp" as="image" type="image/webp" fetchpriority="high">
    <link rel="preload" href="assets/images/background_image.webp" as="image" type="image/webp" media="(min-width: 681px)" fetchpriority="high">
    <link rel="preload" href="assets/images/background_image_mobile.webp" as="image" type="image/webp" media="(max-width: 680px)" fetchpriority="high">
    <link rel="preload" href="assets/fonts/MaShanZheng-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Main stylesheet for all layout, animation, and responsive behavior. -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Fixed scene background: the always-visible mountain artwork, dark overlays, and animated leaf canvas. -->
    <div class="fixed-scene" aria-hidden="true">
      <picture class="scene-bg">
        <source media="(max-width: 680px)" srcset="assets/images/background_image_mobile.webp" type="image/webp">
        <img src="assets/images/background_image.webp" alt="" fetchpriority="high" decoding="sync">
      </picture>
      <div class="scene-shade"></div>
      <div class="scene-bottom-fade"></div>
      <canvas class="leaf-canvas" data-leaf-canvas></canvas>
    </div>

    <!-- Loading overlay: tracks startup progress, then fades out after initialization finishes. -->
    <div class="loading-screen" data-loader aria-hidden="true">
      <div class="loading-ring" style="--progress: 0;"><span>0%</span></div>
      <p>正在凝聚武魂...</p>
    </div>

    <!-- Site header: brand mark, main navigation, mobile menu toggle, and account buttons. -->
    <header class="site-header" data-header>
      <a class="brand" href="#home" aria-label="返回首页">
        <span class="brand-mark">墨</span>
        <span class="brand-name">鸿禧墨魂+30</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="打开导航" aria-expanded="false" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="主导航" data-nav>
        <a href="#home">首页</a>
        <a href="#features">特色</a>
        <a href="#rank">龙虎榜</a>
        <a href="#classes">流派</a>
        <a href="#gallery">绘卷</a>
        <a href="#news">风云</a>
        <a href="#community">社群</a>
        <a href="guides.html">攻略</a>
        <a href="download.html">下载</a>
      </nav>
      <div class="auth-actions" aria-label="账号操作">
        <button type="button" data-auth-open="login">登录</button>
        <button type="button" class="auth-primary" data-auth-open="register">注册</button>
      </div>
    </header>

    <main>
      <!-- Homepage sections are loaded from sections/home/*.html for easier maintenance. -->
      <div class="page-view is-active" data-page="home">
        <div data-include="sections/home/hero.html"></div>
        <div data-include="sections/home/features.html"></div>
        <div data-include="sections/home/ranking.html"></div>
        <div data-include="sections/home/classes.html"></div>
        <div data-include="sections/home/gallery.html"></div>
        <div data-include="sections/home/news-teaser.html"></div>
        <div data-include="sections/home/community.html"></div>
      </div>

    </main>
    <!-- Site footer: legal links, brand signature, copyright, and rating notice. -->
    <footer class="site-footer">
      <div class="footer-inner">
        <nav class="footer-links" aria-label="页脚链接">
          <a href="#">隐私权政策</a>
          <span aria-hidden="true">|</span>
          <a href="#">使用条款</a>
          <span aria-hidden="true">|</span>
          <a href="mailto:contact@mohun.com">联系我们</a>
        </nav>
        <h2>无界墨香</h2>
        <p>
          Copyright © 2026 QX Studio. All Rights Reserved.<br>
          本游戏情节涉及暴力、不当言语，依游戏软件分级管理办法分类为
          <span class="rating-badge">辅12级</span>
        </p>
      </div>
    </footer>

    <!-- Floating back-to-top button; js/shared/back-top.js reveals it after scrolling. -->
    <button class="back-top" type="button" aria-label="返回顶部" data-back-top>⌃</button>

    <!-- Auth modal: one dialog containing login, register, and forgot-password forms. -->
    <div class="auth-modal" data-auth-modal aria-hidden="true">
      <div class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <button class="modal-close" type="button" aria-label="关闭" data-auth-close>×</button>
        <p class="eyebrow" data-auth-eyebrow>账号</p>
        <h2 id="auth-title" data-auth-title>进入江湖</h2>

        <form class="auth-form is-active" data-auth-form="login" novalidate>
          <div class="auth-alert is-hidden" role="alert" aria-live="polite" data-auth-alert></div>
          <label class="auth-field">
            <span>大侠尊姓大名(账号)</span>
            <input type="text" name="username" autocomplete="username" placeholder="请输入账号">
          </label>
          <label class="auth-field">
            <span>通关密语(密码)</span>
            <span class="password-field">
              <input type="password" name="password" autocomplete="current-password" placeholder="请输入密码 (至少8位)">
              <button class="password-toggle" type="button" aria-label="显示密码" data-password-toggle>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3.98 8.22A10.48 10.48 0 0 0 1.93 12C3.23 16.34 7.24 19.5 12 19.5c.99 0 1.95-.14 2.86-.4M6.23 6.23A10.45 10.45 0 0 1 12 4.5c4.76 0 8.77 3.16 10.07 7.5a10.52 10.52 0 0 1-4.29 5.77M6.23 6.23 3 3m3.23 3.23 3.65 3.65m7.89 7.89L21 21m-3.23-3.23-3.65-3.65m0 0a3 3 0 1 0-4.24-4.24m4.24 4.24L9.88 9.88"/>
                </svg>
              </button>
            </span>
          </label>
          <div class="auth-options">
            <label class="remember-field">
              <input type="checkbox">
              记住我
            </label>
            <button class="text-button" type="button" data-auth-open="forgot">忘记密码？</button>
          </div>
          <button class="auth-submit" type="submit">登 录</button>
          <p class="auth-switch">尚未加入江湖？ <button class="text-button" type="button" data-auth-open="register">立即注册</button></p>
        </form>

        <form class="auth-form auth-form--register" data-auth-form="register" novalidate>
          <div class="auth-alert is-hidden" role="alert" aria-live="polite" data-auth-alert></div>
          <label class="auth-field auth-field--full">
            <span>大侠尊姓大名(账号)</span>
            <input type="text" name="username" autocomplete="username" placeholder="4-20位字母或数字">
          </label>
          <label class="auth-field">
            <span>通关密语(密码)</span>
            <span class="password-field">
              <input type="password" name="password" autocomplete="new-password" placeholder="至少8位">
              <button class="password-toggle" type="button" aria-label="显示密码" data-password-toggle>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3.98 8.22A10.48 10.48 0 0 0 1.93 12C3.23 16.34 7.24 19.5 12 19.5c.99 0 1.95-.14 2.86-.4M6.23 6.23A10.45 10.45 0 0 1 12 4.5c4.76 0 8.77 3.16 10.07 7.5a10.52 10.52 0 0 1-4.29 5.77M6.23 6.23 3 3m3.23 3.23 3.65 3.65m7.89 7.89L21 21m-3.23-3.23-3.65-3.65m0 0a3 3 0 1 0-4.24-4.24m4.24 4.24L9.88 9.88"/>
                </svg>
              </button>
            </span>
          </label>
          <label class="auth-field">
            <span>核对密语(确认密码)</span>
            <span class="password-field">
              <input type="password" name="confirmPassword" autocomplete="new-password" placeholder="再次输入">
              <button class="password-toggle" type="button" aria-label="显示密码" data-password-toggle>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3.98 8.22A10.48 10.48 0 0 0 1.93 12C3.23 16.34 7.24 19.5 12 19.5c.99 0 1.95-.14 2.86-.4M6.23 6.23A10.45 10.45 0 0 1 12 4.5c4.76 0 8.77 3.16 10.07 7.5a10.52 10.52 0 0 1-4.29 5.77M6.23 6.23 3 3m3.23 3.23 3.65 3.65m7.89 7.89L21 21m-3.23-3.23-3.65-3.65m0 0a3 3 0 1 0-4.24-4.24m4.24 4.24L9.88 9.88"/>
                </svg>
              </button>
            </span>
          </label>
          <label class="auth-field">
            <span>电子邮箱</span>
            <input type="email" name="email" autocomplete="email" placeholder="找回密码凭证">
          </label>
          <label class="auth-field">
            <span>手机号码</span>
            <input type="tel" name="phone" autocomplete="tel" placeholder="绑定手机号">
          </label>
          <label class="auth-field auth-field--full">
            <span>二级密码</span>
            <span class="password-field">
              <input type="password" name="secondaryPassword" inputmode="numeric" placeholder="请输入4位数二级密码，保护游戏内财产">
              <button class="password-toggle" type="button" aria-label="显示密码" data-password-toggle>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3.98 8.22A10.48 10.48 0 0 0 1.93 12C3.23 16.34 7.24 19.5 12 19.5c.99 0 1.95-.14 2.86-.4M6.23 6.23A10.45 10.45 0 0 1 12 4.5c4.76 0 8.77 3.16 10.07 7.5a10.52 10.52 0 0 1-4.29 5.77M6.23 6.23 3 3m3.23 3.23 3.65 3.65m7.89 7.89L21 21m-3.23-3.23-3.65-3.65m0 0a3 3 0 1 0-4.24-4.24m4.24 4.24L9.88 9.88"/>
                </svg>
              </button>
            </span>
          </label>
          <button class="auth-submit" type="submit">注 册</button>
          <p class="auth-switch">已有账号？ <button class="text-button" type="button" data-auth-open="login">立即登录</button></p>
        </form>

        <form class="auth-form" data-auth-form="forgot" novalidate>
          <div class="auth-alert is-hidden" role="alert" aria-live="polite" data-auth-alert></div>
          <label class="auth-field">
            <span>找回密码凭证</span>
            <input type="text" name="identifier" autocomplete="username" placeholder="请输入账号或手机号">
          </label>
          <button class="auth-submit" type="submit">发送重置链接</button>
          <p class="auth-switch"><button class="text-button" type="button" data-auth-open="login">想起密语了</button></p>
        </form>
      </div>
    </div>

    <!-- Module entrypoint: loads section fragments, then initializes shared and page-specific behavior. -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
