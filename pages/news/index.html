    <div class="auth-modal" data-auth-modal aria-hidden="true">

        <button class="modal-close" type="button" aria-label="关闭" data-auth-close>×</button>
        <p class="eyebrow" data-auth-eyebrow>账号</p>

          <label class="auth-field">
            <span>通关密语(密码)</span>
            <span class="password-field">

          <p class="auth-switch">尚未加入江湖？ <button class="text-button" type="button" data-auth-open="register">立即注册</button></p>
        </form>

        <form class="auth-form auth-form--register" data-auth-form="register" novalidate>
          <div class="auth-alert is-hidden" role="alert" aria-live="polite" data-auth-alert></div>
          <label class="auth-field auth-field--full">
            <span>大侠尊姓大名(账号)</span>
            <input type="text" name="username" autocomplete="username" placeholder="4-20位字母或数字">
          </label>
          <label class="auth-field">
            <span>通关密语(密码)</span>
            <span class="password-field">
              <input type="password" name="password" autocomplete="new-password" placeholder="至少8位">

            </span>
          </label>
          <label class="auth-field">
            <span>核对密语(确认密码)</span>

          </label>
          <label class="auth-field">
            <span>电子邮箱</span>
            <input type="email" name="email" autocomplete="email" placeholder="找回密码凭证">

          <label class="auth-field">

          <p class="auth-switch"><button class="text-button" type="button" data-auth-open="login">想起密语了</button></p>
        </form>
