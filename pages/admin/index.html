<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="鸿禧墨魂+30 榜单管理后台，用于维护首页风云龙虎榜内容。">
    <meta name="robots" content="noindex, nofollow">
    <title>榜单管理后台 - 鸿禧墨魂+30</title>

    <link rel="icon" href="../../assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../../assets/android-chrome-192x192.png">

    <link rel="preload" href="../../assets/images/background_image.webp" as="image" type="image/webp" fetchpriority="high">
    <link rel="preload" href="../../assets/fonts/MaShanZheng-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="../../styles.css">
  </head>
  <body class="admin-page">
    <div class="fixed-scene" aria-hidden="true">
      <picture class="scene-bg">
        <img src="../../assets/images/background_image.webp" alt="" fetchpriority="high" decoding="sync">
      </picture>
      <div class="scene-shade"></div>
      <div class="scene-bottom-fade"></div>
      <canvas class="leaf-canvas" data-leaf-canvas></canvas>
    </div>

    <header class="site-header admin-header">
      <a class="brand" href="../../index.html#home" aria-label="返回首页">
        <span class="brand-mark">墨</span>
        <span class="brand-name">鸿禧墨魂+30</span>
      </a>
      <nav class="site-nav admin-nav" aria-label="后台导航">
        <a href="../../index.html#rank">查看首页榜单</a>
        <a href="../../index.html#home">返回官网首页</a>
      </nav>
      <div class="auth-actions admin-session-actions" aria-label="后台会话">
        <span class="admin-session-chip" data-admin-session-label>未登录</span>
        <button type="button" class="auth-primary" data-admin-logout hidden>退出</button>
      </div>
    </header>

    <main class="admin-main">
      <section class="section framed-section admin-shell" aria-labelledby="admin-title">
        <div class="admin-heading">
          <p class="admin-kicker">Admin Console</p>
          <h1 id="admin-title">风云龙虎榜内容管理</h1>
          <p>编辑首页排行榜内容，并将更新直接同步到线上站点。</p>
        </div>

        <div class="auth-alert is-hidden admin-status-panel" role="status" aria-live="polite" data-admin-status></div>

        <section class="admin-workspace">
          <div class="admin-session-strip">
            <div class="admin-session-card">
              <span class="admin-session-label">当前账号</span>
              <strong data-admin-email>未登录</strong>
            </div>
            <div class="admin-session-card">
              <span class="admin-session-label">UID</span>
              <code class="admin-code" data-admin-uid>等待登录</code>
            </div>
          </div>

          <div class="admin-login-card" data-admin-login-panel>
            <div class="admin-card-heading">
              <div>
                <p class="admin-card-kicker">Authentication</p>
                <h2>管理员登录</h2>
              </div>
              <p>使用已启用的 Firebase Auth 邮箱账号登录。</p>
            </div>

            <form class="admin-form" data-admin-login-form novalidate>
              <div class="auth-alert is-hidden" role="alert" aria-live="polite" data-admin-login-alert></div>

              <label class="auth-field">
                <span>管理员邮箱</span>
                <input type="email" name="email" autocomplete="email" placeholder="name@company.com">
              </label>

              <label class="auth-field">
                <span>登录密码</span>
                <span class="password-field">
                  <input type="password" name="password" autocomplete="current-password" placeholder="请输入密码">
                  <button class="password-toggle" type="button" aria-label="显示密码" data-password-toggle>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M3.98 8.22A10.48 10.48 0 0 0 1.93 12C3.23 16.34 7.24 19.5 12 19.5c.99 0 1.95-.14 2.86-.4M6.23 6.23A10.45 10.45 0 0 1 12 4.5c4.76 0 8.77 3.16 10.07 7.5a10.52 10.52 0 0 1-4.29 5.77M6.23 6.23 3 3m3.23 3.23 3.65 3.65m7.89 7.89L21 21m-3.23-3.23-3.65-3.65m0 0a3 3 0 1 0-4.24-4.24m4.24 4.24L9.88 9.88"/>
                    </svg>
                  </button>
                </span>
              </label>

              <button class="auth-submit admin-primary-action" type="submit">进入后台</button>
            </form>
          </div>

          <div class="admin-pending-card" data-admin-pending-panel hidden>
            <div class="admin-card-heading">
              <div>
                <p class="admin-card-kicker">Access</p>
                <h2>账号已登录，等待授权</h2>
              </div>
            </div>
            <p>当前账号已经登录，但还没有后台编辑权限。请将上方显示的 UID 加入 Firestore 管理员白名单后再刷新此页面。</p>
          </div>

          <div class="admin-editor" data-admin-editor-panel hidden>
            <div class="admin-toolbar">
              <div class="admin-toolbar-head">
                <div>
                  <p class="admin-card-kicker">Content</p>
                  <h2 data-admin-category-label>世界头目</h2>
                </div>
                <div class="admin-toolbar-actions">
                  <button class="text-button" type="button" data-admin-reload>重新读取</button>
                  <button class="text-button" type="button" data-admin-load-sample>恢复示例</button>
                  <button class="auth-submit admin-save-button" type="button" data-admin-save>保存榜单</button>
                </div>
              </div>

              <div class="segmented-control admin-category-tabs" role="tablist" aria-label="榜单分类" data-admin-category-tabs></div>
            </div>

            <div class="admin-editor-layout">
              <section class="admin-editor-card">
                <div class="admin-editor-card-head">
                  <div>
                    <p class="admin-card-kicker">Editor</p>
                    <h2>榜单条目</h2>
                  </div>
                  <button class="text-button" type="button" data-admin-add-row>新增一行</button>
                </div>

                <div class="admin-row-list" data-admin-row-list></div>
              </section>

              <aside class="admin-preview-card">
                <div class="admin-card-heading">
                  <div>
                    <p class="admin-card-kicker">Preview</p>
                    <h2>前台预览</h2>
                  </div>
                </div>
                <ol class="admin-preview-list" data-admin-preview-list></ol>
                <p class="admin-preview-meta" data-admin-updated-meta>尚未从云端读取数据。</p>
              </aside>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="../../js/entries/admin.js"></script>
  </body>
</html>
